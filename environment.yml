# Conda installs a small base (Python + PyTorch stack). All Python packages are pinned in
# requirements.txt and installed here via pip so venv and conda stay aligned.
# Env name must stay in sync with Makefile ENV_NAME and README (hyphen: dsci575-ml).
name: dsci575-ml
channels:
  - pytorch
  - conda-forge
dependencies:
  - python=3.11
  - numpy<2
  - pytorch=2.2.2
  - pip
  - pip:
      - -r requirements.txt
